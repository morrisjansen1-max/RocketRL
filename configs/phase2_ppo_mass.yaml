# Phase 2b: phase 2a + propellant depletion (time-varying
# mass and inertia). Fine-tunes the phase-2a policy.
run_name: phase2_ppo_mass
init_from: runs/phase2_ppo_gimbal_s{seed}/best_model.zip
seed: 0
algo: ppo
total_timesteps: 5_000_000
n_envs: 8
device: cpu

eval:
  freq: 25000
  n_episodes: 20

env:
  # gimbal, RCS, and mass_depletion (true) from canonical defaults
  cda: 0.0
  wind:
    enabled: false
  init:
    x: [-15.0, 15.0]
    y: [90.0, 110.0]
    vx: [-1.0, 1.0]
    vy: [-10.0, -6.0]
    theta_deg: [-3.0, 3.0]
    omega: [-0.05, 0.05]

algo_kwargs:
  learning_rate: lin_1.0e-4
  n_steps: 1024
  batch_size: 256
  n_epochs: 4
  gamma: 0.999
  gae_lambda: 0.98
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  net_arch: [64, 64]
