# SAC experiment, Phase 2c: fine-tune the SAC mass-stage
# policy onto drag + unobserved wind (the full environment). 
run_name: phase2_sac_wind
init_from: runs/phase2_sac_mass_s{seed}/best_model.zip
seed: 0
algo: sac
total_timesteps: 1_000_000
n_envs: 8
device: cpu

eval:
  freq: 25000
  n_episodes: 20

env:
  # gimbal, mass_depletion, cda (80) from defaults; wind on = full env
  wind:
    enabled: true
    mean_speed: 5.0
    gust_sigma: 2.0
    gust_tau: 2.0
    randomize_direction: true
  init:
    x: [-15.0, 15.0]
    y: [90.0, 110.0]
    vx: [-1.0, 1.0]
    vy: [-10.0, -6.0]
    theta_deg: [-3.0, 3.0]
    omega: [-0.05, 0.05]

algo_kwargs:
  learning_rate: 3.0e-4
  buffer_size: 1_000_000
  batch_size: 256
  gamma: 0.99
  tau: 0.01
  ent_coef: auto
  train_freq: 1
  gradient_steps: 8
  learning_starts: 10000
  net_arch: [256, 256]
